syntax = "proto3";

package org.example.crypto.exchange.messaging;

option java_multiple_files = true;
option java_package = "org.example.crypto.exchange.messaging.proto";
option java_outer_classname = "OrderEventProtos";

enum OrderSideProto {
  BUY = 0;
  SELL = 1;
}

enum OrderTypeProto {
  MARKET = 0;
  LIMIT = 1;
}

enum OrderActionProto {
  PLACE = 0;
  CANCEL = 1;
  AMEND = 2;
}

message OrderEventProto {
  string user_id = 1;
  OrderSideProto side = 2;
  string price = 3;
  string quantity = 4;
  OrderTypeProto order_type = 5;
  string order_id = 6;        // UUID assigned by the generator; exchange uses it as the entity ID
  OrderActionProto action = 7; // defaults to PLACE (0) for backward compatibility
}
