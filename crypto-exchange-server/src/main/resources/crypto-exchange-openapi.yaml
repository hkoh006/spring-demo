openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v0
servers:
- url: http://localhost:65284
  description: Generated server url
paths:
  /api/trades:
    get:
      tags:
      - trade-endpoint
      operationId: getAllTrades
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradeDto"
  /api/trades/{id}:
    get:
      tags:
      - trade-endpoint
      operationId: getTradeById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradeDto"
  /api/orders:
    get:
      tags:
      - order-endpoint
      operationId: getAllOrders
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrderDto"
  /api/orders/{id}:
    get:
      tags:
      - order-endpoint
      operationId: getOrderById
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderDto"
  /api/market/analytics:
    get:
      tags:
      - market-analytics-endpoint
      operationId: getMarketAnalytics
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketAnalyticsDto"
components:
  schemas:
    TradeDto:
      type: object
      properties:
        id:
          type: string
        buyerId:
          type: string
        sellerId:
          type: string
        price:
          type: number
        quantity:
          type: number
        timestamp:
          type: string
          format: date-time
      required:
      - buyerId
      - id
      - price
      - quantity
      - sellerId
      - timestamp
    OrderDto:
      type: object
      properties:
        id:
          type: string
        userId:
          type: string
        side:
          type: string
          enum:
          - BUY
          - SELL
        price:
          type: number
        quantity:
          type: number
        remainingQuantity:
          type: number
        timestamp:
          type: string
          format: date-time
        isFilled:
          type: boolean
      required:
      - id
      - isFilled
      - price
      - quantity
      - remainingQuantity
      - side
      - timestamp
      - userId
    MarketAnalyticsDto:
      type: object
      properties:
        volume:
          type: number
        high:
          type: number
        low:
          type: number
        lastPrice:
          type: number
        bestBid:
          type: number
        bestAsk:
          type: number
      required:
      - volume
